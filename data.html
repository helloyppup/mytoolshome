<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备数据解析与 AI 助手</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Custom Scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        body {
            background-color: #f8fafc;
            color: #0f172a;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons (Inline SVGs to keep single file) ---
        const SettingsIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const ColumnsIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3h7a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-7m0-18H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h7m0-18v18"/></svg>;
        const SendIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
        const BotIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>;
        const UserIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const PlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const TrashIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const ChevronLeftIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>;
        const ChevronRightIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;
        const ExpandIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>;
        const DownloadIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;

        const DEFAULT_INPUT = ``;

        // Utility encoding/decoding
        const decodeBase64 = (base64Str) => {
            try {
                const binaryStr = atob(base64Str);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
                return new TextDecoder('utf-8').decode(bytes);
            } catch (e) {
                console.error("Base64 decode error:", e);
                return "{}";
            }
        };

        const encodeBase64 = (textStr) => {
            try {
                const bytes = new TextEncoder().encode(textStr);
                let binaryStr = '';
                for (let i = 0; i < bytes.length; i++) binaryStr += String.fromCharCode(bytes[i]);
                return btoa(binaryStr);
            } catch (e) {
                console.error("Base64 encode error:", e);
                return "";
            }
        };

        const App = () => {
            const [rawInput, setRawInput] = useState(DEFAULT_INPUT);
            const [sourceMeta, setSourceMeta] = useState({ did: '', pid: '', token: '' });
            const [devicesData, setDevicesData] = useState(null);
            const [familyData, setFamilyData] = useState(null);
            const [linkagesData, setLinkagesData] = useState(null); // 新增联动数据状态
            const [activeTab, setActiveTab] = useState('linkages'); // 'devices', 'family' 或 'linkages'
            
            const [selectedRows, setSelectedRows] = useState(new Set()); // 选中的行（成员）
            const [familyPermission, setFamilyPermission] = useState(0); // 新增：生成的家庭成员权限值 (0, 1, 2)
            
            const [isChatOpen, setIsChatOpen] = useState(true);
            const [error, setError] = useState('');
            
            // Column State
            const [availableColumns, setAvailableColumns] = useState([]);
            const [visibleColumns, setVisibleColumns] = useState([]);
            const [showColumnDropdown, setShowColumnDropdown] = useState(false);
            const [columnWidths, setColumnWidths] = useState({});
            const resizingCol = useRef(null);

            // Json Modal State
            const [jsonModalData, setJsonModalData] = useState(null);

            // Settings State
            const [showSettings, setShowSettings] = useState(false);
            const [apiKey, setApiKey] = useState('');
            const [provider, setProvider] = useState('');
            const [model, setModel] = useState('');

            // Available Models Configuration
            const AVAILABLE_MODELS = {
                deepseek: [
                    { id: 'deepseek-chat', name: 'DeepSeek Chat (V3)' },
                    { id: 'deepseek-reasoner', name: 'DeepSeek Reasoner (R1)' }
                ],
                gemini: [
                    { id: 'gemini-2.5-flash-preview-09-2025', name: 'Gemini 2.5 Flash' },
                    { id: 'gemini-1.5-pro-latest', name: 'Gemini 1.5 Pro' },
                    { id: 'gemini-1.5-flash-latest', name: 'Gemini 1.5 Flash' }
                ]
            };

            // Chat State
            const createInitialChat = () => ({
                id: Date.now().toString(),
                title: '新对话',
                messages: [{ role: 'assistant', content: '您好！我是设备数据 AI 助手。您可以在左侧解析数据，然后在这里向我提问关于这些设备的问题。' }]
            });
            const [chats, setChats] = useState([createInitialChat()]);
            const [activeChatId, setActiveChatId] = useState(chats[0].id);
            const [chatInput, setChatInput] = useState('');
            const [isChatLoading, setIsChatLoading] = useState(false);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                handleDecode();
                
                const savedKey = localStorage.getItem('deviceTool_apiKey');
                const savedProvider = localStorage.getItem('deviceTool_provider');
                const savedModel = localStorage.getItem('deviceTool_model');
                
                if (savedKey) setApiKey(savedKey);
                if (savedProvider) setProvider(savedProvider);
                if (savedModel) setModel(savedModel);
            }, []);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [chats, activeChatId]);

            const handleKeyChange = (val) => {
                setApiKey(val);
                const key = val.trim();
                if (key.startsWith('AIza')) {
                    setProvider('gemini');
                    setModel(AVAILABLE_MODELS.gemini[0].id);
                } else if (key.startsWith('sk-')) {
                    setProvider('deepseek');
                    setModel(AVAILABLE_MODELS.deepseek[0].id);
                } else {
                    setProvider('');
                    setModel('');
                }
            };

            const saveSettings = () => {
                localStorage.setItem('deviceTool_apiKey', apiKey);
                localStorage.setItem('deviceTool_provider', provider);
                localStorage.setItem('deviceTool_model', model);
                setShowSettings(false);
            };

            const handleNewChat = () => {
                const newChat = createInitialChat();
                setChats(prev => [...prev, newChat]);
                setActiveChatId(newChat.id);
            };

            const handleDeleteChat = (e, id) => {
                e.stopPropagation();
                setChats(prev => {
                    const filtered = prev.filter(c => c.id !== id);
                    if (filtered.length === 0) {
                        const newChat = createInitialChat();
                        setActiveChatId(newChat.id);
                        return [newChat];
                    }
                    if (activeChatId === id) {
                        setActiveChatId(filtered[filtered.length - 1].id);
                    }
                    return filtered;
                });
            };

            const updateColumns = (dataArray, type) => {
                if (!dataArray || dataArray.length === 0) {
                    setAvailableColumns([]);
                    setVisibleColumns([]);
                    return;
                }
                const keys = new Set();
                dataArray.forEach(item => Object.keys(item).forEach(k => keys.add(k)));
                const allKeys = Array.from(keys);
                setAvailableColumns(allKeys);

                let defaultCols = [];
                if (type === 'devices') {
                    defaultCols = ['devname', 'room', 'mac', 'blecategory', 'version', 'shortaddr'];
                } else if (type === 'family') {
                    defaultCols = ['name', 'uuid', 'permission', 'validTime'];
                } else if (type === 'linkages') {
                    defaultCols = ['rulename', 'ruleid', 'ruletype', 'enable', 'actions', 'characteristicinfo'];
                }

                const initialVisible = allKeys.filter(k => defaultCols.includes(k));
                setVisibleColumns(initialVisible.length > 0 ? initialVisible : allKeys.slice(0, 6));
            };

            const handleResizeStart = (e, col) => {
                e.preventDefault();
                const startX = e.clientX;
                const th = e.target.closest('th');
                const startWidth = th.offsetWidth;

                resizingCol.current = { col, startX, startWidth };

                const handleMouseMove = (moveEvent) => {
                    if (!resizingCol.current) return;
                    const { col, startX, startWidth } = resizingCol.current;
                    const newWidth = Math.max(50, startWidth + (moveEvent.clientX - startX));
                    setColumnWidths(prev => ({ ...prev, [col]: newWidth }));
                };

                const handleMouseUp = () => {
                    resizingCol.current = null;
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                    document.body.style.cursor = 'default';
                };

                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
                document.body.style.cursor = 'col-resize';
            };

            const deepParseJson = (obj) => {
                if (typeof obj === 'string') {
                    let trimmed = obj.trim();
                    if ((trimmed.startsWith('{') && trimmed.endsWith('}')) || (trimmed.startsWith('[') && trimmed.endsWith(']'))) {
                        try {
                            const parsed = JSON.parse(trimmed);
                            return deepParseJson(parsed);
                        } catch (e) {
                            return obj;
                        }
                    }
                    return obj;
                } else if (typeof obj === 'object' && obj !== null) {
                    if (Array.isArray(obj)) {
                        return obj.map(item => deepParseJson(item));
                    } else {
                        const newObj = {};
                        for (const key in obj) {
                            newObj[key] = deepParseJson(obj[key]);
                        }
                        return newObj;
                    }
                }
                return obj;
            };

            const isComplex = (val) => {
                if (!val) return false;
                if (typeof val === 'object') return true;
                if (typeof val === 'string') {
                    const t = val.trim();
                    if (t.length <= 2) return false; 
                    return (t.startsWith('{') && t.endsWith('}')) || (t.startsWith('[') && t.endsWith(']'));
                }
                return false;
            };

            const openJsonModal = (item, col) => {
                const rawData = item[col];
                const parsedData = deepParseJson(rawData);
                const deviceName = item.rulename || item.devname || item.name || item.mac || item.uuid || '当前行';
                
                setJsonModalData({
                    deviceName: deviceName,
                    colName: col,
                    data: JSON.stringify(parsedData, null, 2)
                });
            };

            const copyToClipboard = (text) => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    alert('已复制到剪贴板！');
                } catch (err) {
                    alert('复制失败，请手动选择复制');
                }
                document.body.removeChild(textarea);
            };

            const handleTabSwitch = (tab) => {
                setActiveTab(tab);
                setColumnWidths({});
                setSelectedRows(new Set()); // 切换标签时重置选中项
                updateColumns(tab === 'devices' ? devicesData : (tab === 'family' ? familyData : linkagesData), tab);
            };

            const handleDecode = () => {
                try {
                    setError('');
                    const parsed = JSON.parse(rawInput);
                    
                    // 尝试从源数据提取 did, pid, token
                    let meta = { did: '', pid: '', token: '' };
                    const reqBody = parsed?.data?.ReqBody || parsed?.ReqBody;
                    if (reqBody?.devList && reqBody.devList.length > 0) {
                        meta.did = reqBody.devList[0].did || '';
                        meta.pid = reqBody.devList[0].pid || '';
                        meta.token = reqBody.devList[0].token || '';
                    } else if (reqBody?.familyvt) {
                        meta.did = reqBody.familyvt.did || '';
                        meta.pid = reqBody.familyvt.pid || '';
                        meta.token = reqBody.familyvt.token || '';
                    }
                    if (!meta.did) meta.did = parsed?.data?.did || parsed?.did || '';
                    setSourceMeta(meta);

                    let dataList = [];
                    let extractedDevices = [];
                    let extractedFamily = [];
                    let extractedLinkages = [];

                    // 1. 优先解析含有 Linkages 的源数据（触发器上传格式）
                    if (parsed.data && parsed.data.ReqBody && Array.isArray(parsed.data.ReqBody.linkages)) {
                        extractedLinkages = parsed.data.ReqBody.linkages;
                    } 
                    // 2. 解析含有 devPrivateData 的目标数据格式（包含 Base64 加密的家庭/设备）
                    if (parsed.data && parsed.data.Response && parsed.data.Response.data && parsed.data.Response.data[0] && parsed.data.Response.data[0].dataList) {
                        dataList = parsed.data.Response.data[0].dataList;
                    } 
                    // 3. 处理老旧的平级数据
                    else if (parsed.data && typeof parsed.data === 'string') {
                        dataList = [{ mtag: parsed.mtag || 'devlist', data: parsed.data }];
                    } else if (extractedLinkages.length === 0) {
                        throw new Error("JSON 格式无法识别，找不到符合要求的数据结构。");
                    }

                    // 提取 Base64 隐藏层数据
                    dataList.forEach(item => {
                        if (!item.data) return;
                        try {
                            const decodedStr = decodeBase64(item.data);
                            const decodedItem = JSON.parse(decodedStr);

                            if (item.mtag === 'devlist') {
                                extractedDevices = extractedDevices.concat(Array.isArray(decodedItem) ? decodedItem : [decodedItem]);
                            } else if (item.mtag && item.mtag.startsWith('FamilyControl_')) {
                                extractedFamily = extractedFamily.concat(Array.isArray(decodedItem) ? decodedItem : [decodedItem]);
                            }
                        } catch(e) {
                            console.warn("单条数据解析失败", item, e);
                        }
                    });

                    setDevicesData(extractedDevices);
                    setFamilyData(extractedFamily);
                    setLinkagesData(extractedLinkages);
                    setSelectedRows(new Set()); // 重新解析清空选中
                    
                    if (extractedLinkages.length > 0) {
                        setActiveTab('linkages');
                        updateColumns(extractedLinkages, 'linkages');
                    } else if (extractedDevices.length > 0) {
                        setActiveTab('devices');
                        updateColumns(extractedDevices, 'devices');
                    } else if (extractedFamily.length > 0) {
                        setActiveTab('family');
                        updateColumns(extractedFamily, 'family');
                    } else {
                        setDevicesData(null);
                        setFamilyData(null);
                        setLinkagesData(null);
                        throw new Error("未解析到任何设备、家庭成员或联动数据");
                    }
                } catch (e) {
                    setError('解析失败: ' + e.message);
                    setDevicesData(null);
                    setFamilyData(null);
                    setLinkagesData(null);
                }
            };

            const toggleColumn = (col) => {
                setVisibleColumns(prev => 
                    prev.includes(col) ? prev.filter(c => c !== col) : [...prev, col]
                );
            };

            const currentData = activeTab === 'devices' ? devicesData : (activeTab === 'family' ? familyData : linkagesData);

            // 选择行处理
            const handleSelectAll = (e) => {
                if (e.target.checked && currentData) {
                    setSelectedRows(new Set(currentData.map((_, i) => i)));
                } else {
                    setSelectedRows(new Set());
                }
            };

            const toggleRow = (idx) => {
                setSelectedRows(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(idx)) newSet.delete(idx);
                    else newSet.add(idx);
                    return newSet;
                });
            };

            // 生成指定的 JSON 模板功能
            const handleGenerateTargetJson = () => {
                const selectedItems = Array.from(selectedRows).map(idx => currentData[idx]);
                
                let dataList = [];

                if (activeTab === 'family') {
                    dataList = selectedItems.map(item => {
                        // 强制指定字段和顺序，过滤掉 stability 等多余字段
                        const modifiedItem = {
                            uuid: item.uuid || '',
                            validTime: item.validTime !== undefined ? item.validTime : 0,
                            name: item.name || '',
                            permission: familyPermission
                        };
                        return {
                            data: encodeBase64(JSON.stringify(modifiedItem)),
                            mtag: `FamilyControl_${item.uuid || ''}`,
                            validTime: 0
                        };
                    });
                } else if (activeTab === 'devices') {
                    dataList = [{
                        data: encodeBase64(JSON.stringify(selectedItems)),
                        mtag: 'devlist',
                        validTime: 0
                    }];
                } else if (activeTab === 'linkages') {
                    const plData = {
                        "status": 0,
                        "msg": "",
                        "familyvt": { "did": "", "pid": "", "token": "" },
                        "id": "",
                        "familyid": "",
                        "pushurl": "",
                        "linkageversion": "",
                        "linkages": selectedItems
                    };
                    dataList = [{
                        data: encodeBase64(JSON.stringify(plData)),
                        mtag: 'private_linkage',
                        validTime: 0
                    }];
                }

                const targetJson = [
                    {
                        "devversion": "",
                        "did": sourceMeta.did,
                        "pid": sourceMeta.pid,
                        "token": sourceMeta.token,
                        "vtsubtoken": [],
                        "dataList": dataList
                    }
                ];

                setJsonModalData({
                    deviceName: `基于 ${selectedItems.length} 项选择生成`,
                    colName: '导出 JSON',
                    data: JSON.stringify(targetJson, null, 2)
                });
            };

            const handleSendMessage = async () => {
                if (!chatInput.trim()) return;
                
                if (!apiKey || !provider || !model) {
                    alert('请先在设置中输入有效的 API Key！系统会自动识别并配置模型。');
                    setShowSettings(true);
                    return;
                }

                if (!devicesData && !familyData && !linkagesData) {
                    alert('请先在左侧解析数据，AI 需要基于数据进行回答。');
                    return;
                }

                const userText = chatInput;
                const currentChatId = activeChatId;
                setChatInput('');
                
                setChats(prev => prev.map(c => {
                    if (c.id === currentChatId) {
                        const isFirst = c.messages.length === 1;
                        const newTitle = isFirst ? (userText.length > 8 ? userText.substring(0, 8) + '...' : userText) : c.title;
                        return { ...c, title: newTitle, messages: [...c.messages, { role: 'user', content: userText }] };
                    }
                    return c;
                }));
                
                setIsChatLoading(true);

                const systemPrompt = `你是一个专业的设备与家庭管理助手。以下是用户当前的解析数据（JSON格式）：
${devicesData && devicesData.length > 0 ? `【设备列表】:\n${JSON.stringify(devicesData, null, 2)}\n` : ''}
${familyData && familyData.length > 0 ? `【家庭成员列表】:\n${JSON.stringify(familyData, null, 2)}\n` : ''}
${linkagesData && linkagesData.length > 0 ? `【联动规则列表】:\n${JSON.stringify(linkagesData, null, 2)}\n` : ''}
请根据以上数据回答用户的问题。如果问题与数据无关，可以正常交流，但主要侧重于分析这些数据。保持客观、专业、清晰。`;
                
                const currentChat = chats.find(c => c.id === currentChatId);
                const apiMessages = [
                    ...currentChat.messages.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content })),
                    { role: 'user', content: userText }
                ];

                try {
                    let aiReply = '';

                    if (provider === 'deepseek') {
                        const response = await fetch('https://api.deepseek.com/chat/completions', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${apiKey}`
                            },
                            body: JSON.stringify({
                                model: model,
                                messages: [
                                    { role: 'system', content: systemPrompt },
                                    ...apiMessages
                                ]
                            })
                        });
                        
                        if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
                        const data = await response.json();
                        aiReply = data.choices[0].message.content;

                    } else if (provider === 'gemini') {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: apiMessages.map(m => ({
                                    role: m.role === 'user' ? 'user' : 'model',
                                    parts: [{ text: m.content }]
                                })),
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        });

                        if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
                        const data = await response.json();
                        aiReply = data.candidates[0].content.parts[0].text;
                    }

                    setChats(prev => prev.map(c => c.id === currentChatId ? { ...c, messages: [...c.messages, { role: 'assistant', content: aiReply }] } : c));

                } catch (err) {
                    setChats(prev => prev.map(c => c.id === currentChatId ? { ...c, messages: [...c.messages, { role: 'assistant', content: `❌ 请求失败: ${err.message}` }] } : c));
                } finally {
                    setIsChatLoading(false);
                }
            };

            return (
                <div className="flex flex-col md:flex-row p-4 gap-4 h-screen bg-slate-50 overflow-y-auto md:overflow-hidden relative">
                    
                    {/* Left Column: Data Input & Table */}
                    <div className={`flex flex-col gap-4 min-h-[500px] md:min-h-0 md:h-full transition-all duration-300 ease-in-out ${isChatOpen ? 'w-full md:w-3/5' : 'w-full'}`}>
                        {/* Data Input Card */}
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex-shrink-0">
                            <h2 className="text-lg font-semibold mb-2 flex items-center justify-between">
                                <span>1. 粘贴源数据</span>
                                <button 
                                    onClick={handleDecode}
                                    className="px-4 py-1.5 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 transition shadow-sm"
                                >
                                    解析 & 解码
                                </button>
                            </h2>
                            <textarea 
                                value={rawInput}
                                onChange={(e) => setRawInput(e.target.value)}
                                className="w-full h-32 p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono text-xs resize-none"
                                placeholder="粘贴包含 base64 'data' 字段，或者包含 linkages 节点的完整 JSON 数据..."
                            />
                            {error && <div className="mt-2 text-red-500 text-sm">{error}</div>}
                        </div>

                        {/* Table Card */}
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex-1 overflow-hidden flex flex-col relative">
                            <div className="p-4 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-3 relative">
                                <div className="flex flex-col md:flex-row md:items-center gap-3 md:gap-4">
                                    <h2 className="text-lg font-semibold">2. 数据表格</h2>
                                    <div className="flex bg-slate-100 p-1 rounded-lg">
                                        {linkagesData && linkagesData.length > 0 && (
                                            <button 
                                                onClick={() => handleTabSwitch('linkages')}
                                                className={`px-3 py-1.5 text-xs md:text-sm rounded-md transition-all ${activeTab === 'linkages' ? 'bg-white shadow-sm font-medium text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                                            >
                                                联动列表 ({linkagesData.length})
                                            </button>
                                        )}
                                        {devicesData && devicesData.length > 0 && (
                                            <button 
                                                onClick={() => handleTabSwitch('devices')}
                                                className={`px-3 py-1.5 text-xs md:text-sm rounded-md transition-all ${activeTab === 'devices' ? 'bg-white shadow-sm font-medium text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                                            >
                                                设备列表 ({devicesData.length})
                                            </button>
                                        )}
                                        {familyData && familyData.length > 0 && (
                                            <button 
                                                onClick={() => handleTabSwitch('family')}
                                                className={`px-3 py-1.5 text-xs md:text-sm rounded-md transition-all ${activeTab === 'family' ? 'bg-white shadow-sm font-medium text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                                            >
                                                家庭成员 ({familyData.length})
                                            </button>
                                        )}
                                    </div>
                                </div>
                                {currentData && currentData.length > 0 && (
                                    <div className="flex items-center gap-2">
                                        {/* 动态显示的权限选择器（仅在家庭成员页） */}
                                        {activeTab === 'family' && (
                                            <div className="flex items-center gap-1.5 mr-1 bg-white border border-slate-200 rounded-lg px-2 shadow-sm">
                                                <span className="text-sm text-slate-500 font-medium whitespace-nowrap">Permission:</span>
                                                <select 
                                                    value={familyPermission}
                                                    onChange={(e) => setFamilyPermission(Number(e.target.value))}
                                                    className="py-1.5 text-sm font-medium text-slate-700 bg-transparent focus:outline-none cursor-pointer"
                                                >
                                                    <option value={0}>0</option>
                                                    <option value={1}>1</option>
                                                    <option value={2}>2</option>
                                                </select>
                                            </div>
                                        )}

                                        {/* 新增：生成指定 JSON 按钮 */}
                                        <button 
                                            onClick={handleGenerateTargetJson}
                                            disabled={selectedRows.size === 0}
                                            className="flex items-center gap-1.5 px-3 py-1.5 text-sm bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed transition shadow-sm"
                                        >
                                            <DownloadIcon />
                                            生成指定 JSON {selectedRows.size > 0 ? `(${selectedRows.size})` : ''}
                                        </button>

                                        <button 
                                            onClick={() => setShowColumnDropdown(!showColumnDropdown)}
                                            className="flex items-center gap-1.5 px-3 py-1.5 text-sm border border-slate-300 rounded-lg hover:bg-slate-50 transition text-slate-700 bg-white"
                                        >
                                            <ColumnsIcon /> 筛选列
                                        </button>
                                        
                                        {showColumnDropdown && (
                                            <div className="absolute right-4 top-14 mt-1 w-48 bg-white border border-slate-200 rounded-lg shadow-lg z-30 py-2 max-h-64 overflow-y-auto">
                                                <div className="px-3 pb-2 mb-2 border-b border-slate-100 text-xs font-semibold text-slate-500">
                                                    选择显示的列
                                                </div>
                                                {availableColumns.map(col => (
                                                    <label key={col} className="flex items-center px-3 py-1.5 hover:bg-slate-50 cursor-pointer text-sm">
                                                        <input 
                                                            type="checkbox"
                                                            checked={visibleColumns.includes(col)}
                                                            onChange={() => toggleColumn(col)}
                                                            className="mr-2 rounded text-blue-600 focus:ring-blue-500"
                                                        />
                                                        <span className="truncate">{col}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                            <div className="p-0 overflow-auto flex-1 relative bg-white">
                                {!currentData || currentData.length === 0 ? (
                                    <div className="absolute inset-0 flex items-center justify-center text-slate-400">
                                        点击上方“解析 & 解码”按钮查看数据
                                    </div>
                                ) : (
                                    <table className="min-w-full text-sm text-left whitespace-nowrap" style={{ tableLayout: 'fixed' }}>
                                        <thead className="text-xs text-slate-600 bg-slate-50 sticky top-0 z-20 shadow-sm">
                                            <tr>
                                                {/* 选择框列 */}
                                                <th className="px-4 py-3 border-r border-slate-200 w-12 text-center sticky left-0 bg-slate-50 z-30">
                                                    <input 
                                                        type="checkbox" 
                                                        onChange={handleSelectAll} 
                                                        checked={currentData.length > 0 && selectedRows.size === currentData.length}
                                                        className="rounded text-blue-600 focus:ring-blue-500 cursor-pointer w-4 h-4"
                                                    />
                                                </th>
                                                {availableColumns.filter(col => visibleColumns.includes(col)).map(col => (
                                                    <th key={col} 
                                                        className="relative px-4 py-3 font-medium border-r border-slate-200 last:border-r-0 group select-none"
                                                        style={{ width: columnWidths[col] || 150 }}
                                                    >
                                                        <div className="overflow-hidden text-ellipsis">{col}</div>
                                                        <div 
                                                            className="absolute right-0 top-0 bottom-0 w-1.5 cursor-col-resize hover:bg-blue-400 group-hover:bg-slate-300 transition-colors z-20"
                                                            onMouseDown={(e) => handleResizeStart(e, col)}
                                                        />
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {currentData.map((item, idx) => (
                                                <tr key={idx} className="border-b border-slate-100 hover:bg-slate-50 group transition-colors">
                                                    {/* 成员选中框 */}
                                                    <td className="px-4 py-3 border-r border-slate-100 text-center sticky left-0 bg-white group-hover:bg-slate-50 z-10 transition-colors">
                                                        <input 
                                                            type="checkbox" 
                                                            checked={selectedRows.has(idx)} 
                                                            onChange={() => toggleRow(idx)}
                                                            className="rounded text-blue-600 focus:ring-blue-500 cursor-pointer w-4 h-4"
                                                        />
                                                    </td>
                                                    {availableColumns.filter(col => visibleColumns.includes(col)).map(col => (
                                                        <td key={col} 
                                                            className="px-4 py-3 text-slate-600 overflow-hidden text-ellipsis border-r border-slate-100 last:border-r-0" 
                                                            title={typeof item[col] === 'object' ? JSON.stringify(item[col]) : item[col]}
                                                            style={{ width: columnWidths[col] || 150 }}
                                                        >
                                                            {isComplex(item[col]) ? (
                                                                <button 
                                                                    onClick={() => openJsonModal(item, col)}
                                                                    className="flex items-center gap-1 px-2 py-1 bg-blue-50 text-blue-600 rounded hover:bg-blue-100 hover:text-blue-800 transition text-xs font-medium"
                                                                >
                                                                    <ExpandIcon /> 展开详情
                                                                </button>
                                                            ) : col === 'blecategory' && item[col] ? (
                                                                <span className="px-2 py-1 bg-blue-100 text-blue-800 rounded text-xs">{item[col]}</span>
                                                            ) : col === 'mac' || col === 'shortaddr' || col === 'uuid' || col === 'ruleid' ? (
                                                                <span className="font-mono text-xs text-slate-500">{item[col] || '-'}</span>
                                                            ) : item[col] !== undefined && item[col] !== null ? (
                                                                typeof item[col] === 'object' ? JSON.stringify(item[col]) : String(item[col])
                                                            ) : '-'}
                                                        </td>
                                                    ))}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Right Column: Chat & Settings */}
                    <div className={`${isChatOpen ? 'flex' : 'hidden'} w-full md:w-2/5 flex-col gap-4 min-h-[600px] md:min-h-0 md:h-full relative transition-all duration-300`}>
                        {/* Chat Box */}
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-hidden">
                            <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-white z-10">
                                <div>
                                    <h2 className="text-lg font-semibold">3. AI 数据洞察</h2>
                                    <div className="text-xs text-slate-500 flex items-center gap-2 mt-1">
                                        <span>当前模型:</span>
                                        {provider ? (
                                            <span className={`px-1.5 py-0.5 rounded ${provider === 'deepseek' ? 'bg-indigo-100 text-indigo-700' : 'bg-green-100 text-green-700'}`}>
                                                {AVAILABLE_MODELS[provider]?.find(m => m.id === model)?.name || model}
                                            </span>
                                        ) : (
                                            <span className="px-1.5 py-0.5 rounded bg-slate-100 text-slate-500">未配置</span>
                                        )}
                                    </div>
                                </div>
                                <div className="flex items-center gap-1">
                                    <button 
                                        onClick={() => setShowSettings(!showSettings)}
                                        className="p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-full transition"
                                        title="设置 API Key"
                                    >
                                        <SettingsIcon />
                                    </button>
                                    <button 
                                        onClick={() => setIsChatOpen(false)}
                                        className="p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-full transition md:hidden lg:block"
                                        title="收起对话框"
                                    >
                                        <ChevronRightIcon />
                                    </button>
                                </div>
                            </div>

                            {/* Chat Messages */}
                            <div className="flex-1 overflow-hidden flex flex-row border-t border-slate-100">
                                
                                {/* Chat Session Sidebar */}
                                <div className="w-1/4 min-w-[100px] max-w-[160px] bg-slate-50 border-r border-slate-100 flex flex-col">
                                    <div className="p-2 border-b border-slate-200">
                                        <button 
                                            onClick={handleNewChat}
                                            className="w-full py-1.5 px-2 bg-white border border-slate-300 rounded text-xs font-medium text-slate-700 hover:bg-slate-100 flex items-center justify-center gap-1 transition shadow-sm"
                                        >
                                            <PlusIcon /> 新建对话
                                        </button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-1.5 space-y-1">
                                        {chats.map(chat => (
                                            <div 
                                                key={chat.id} 
                                                onClick={() => setActiveChatId(chat.id)}
                                                className={`group relative flex items-center justify-between px-2 py-2 text-xs rounded cursor-pointer transition ${
                                                    activeChatId === chat.id 
                                                        ? 'bg-blue-100 text-blue-800 font-semibold' 
                                                        : 'text-slate-600 hover:bg-slate-200'
                                                }`}
                                            >
                                                <span className="truncate pr-4" title={chat.title}>{chat.title}</span>
                                                <button 
                                                    onClick={(e) => handleDeleteChat(e, chat.id)}
                                                    className={`absolute right-1 p-1 rounded hover:bg-red-200 hover:text-red-700 transition opacity-0 group-hover:opacity-100 ${
                                                        activeChatId === chat.id ? 'opacity-100 text-blue-400 hover:text-red-600' : ''
                                                    }`}
                                                    title="删除"
                                                >
                                                    <TrashIcon />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Active Chat Body */}
                                <div className="flex-1 flex flex-col relative bg-slate-50">
                                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                        {chats.find(c => c.id === activeChatId)?.messages.map((msg, idx) => (
                                            <div key={idx} className={`flex gap-3 ${msg.role === 'user' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${msg.role === 'user' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-white'}`}>
                                                    {msg.role === 'user' ? <UserIcon /> : <BotIcon />}
                                                </div>
                                                <div className={`max-w-[80%] rounded-2xl px-4 py-2.5 text-sm ${
                                                    msg.role === 'user' 
                                                        ? 'bg-blue-600 text-white rounded-tr-none' 
                                                        : 'bg-white border border-slate-200 text-slate-800 rounded-tl-none shadow-sm'
                                                }`}>
                                                    <div className="whitespace-pre-wrap">{msg.content}</div>
                                                </div>
                                            </div>
                                        ))}
                                        {isChatLoading && (
                                            <div className="flex gap-3 flex-row">
                                                <div className="w-8 h-8 rounded-full bg-slate-800 text-white flex items-center justify-center flex-shrink-0">
                                                    <BotIcon />
                                                </div>
                                                <div className="bg-white border border-slate-200 text-slate-500 rounded-2xl rounded-tl-none px-4 py-2.5 text-sm shadow-sm flex items-center gap-2">
                                                    <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce"></div>
                                                    <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                                    <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                                                </div>
                                            </div>
                                        )}
                                        <div ref={messagesEndRef} />
                                    </div>

                                    {/* Chat Input */}
                                    <div className="p-3 border-t border-slate-100 bg-white">
                                        <div className="flex gap-2">
                                            <input 
                                                type="text"
                                                value={chatInput}
                                                onChange={(e) => setChatInput(e.target.value)}
                                                onKeyDown={(e) => e.key === 'Enter' && handleSendMessage()}
                                                placeholder={(devicesData || familyData || linkagesData) ? "询问关于数据的问题..." : "请先在左侧解析数据"}
                                                disabled={!devicesData && !familyData && !linkagesData}
                                                className="flex-1 px-4 py-2 border border-slate-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm disabled:bg-slate-100 disabled:cursor-not-allowed"
                                            />
                                            <button 
                                                onClick={handleSendMessage}
                                                disabled={isChatLoading || !chatInput.trim() || (!devicesData && !familyData && !linkagesData)}
                                                className="w-10 h-10 flex items-center justify-center bg-blue-600 text-white rounded-full hover:bg-blue-700 disabled:bg-slate-300 transition"
                                            >
                                                <SendIcon />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Settings Panel (Overlay) */}
                        {showSettings && (
                            <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-20 flex flex-col p-6 rounded-xl border border-slate-200 shadow-lg">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-lg font-bold">API 设置</h3>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-500 hover:text-slate-800">关闭</button>
                                </div>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">API Key</label>
                                        <input 
                                            type="password"
                                            value={apiKey}
                                            onChange={(e) => handleKeyChange(e.target.value)}
                                            className="w-full p-2 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                                            placeholder="粘贴您的 Key (sk-... 或 AIza...)"
                                        />
                                        {provider && (
                                            <p className={`mt-1 text-xs ${provider === 'deepseek' ? 'text-indigo-600' : 'text-green-600'}`}>
                                                ✓ 自动识别为 {provider === 'deepseek' ? 'DeepSeek' : 'Google Gemini'} 密钥
                                            </p>
                                        )}
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">选择模型</label>
                                        <select 
                                            value={model}
                                            onChange={(e) => setModel(e.target.value)}
                                            disabled={!provider}
                                            className="w-full p-2 border border-slate-300 rounded text-sm bg-white disabled:bg-slate-100 disabled:text-slate-400"
                                        >
                                            {!provider && <option value="">请先输入 API Key</option>}
                                            {provider && AVAILABLE_MODELS[provider].map(m => (
                                                <option key={m.id} value={m.id}>{m.name}</option>
                                            ))}
                                        </select>
                                    </div>
                                    
                                    <div className="pt-4">
                                        <button 
                                            onClick={saveSettings}
                                            className="w-full py-2 bg-slate-900 text-white rounded font-medium hover:bg-slate-800 transition disabled:bg-slate-400"
                                            disabled={!apiKey || !provider}
                                        >
                                            保存设置
                                        </button>
                                        <p className="text-xs text-slate-500 mt-3 text-center">
                                            密钥仅保存在您的本地浏览器中，不会上传到任何第三方服务器。
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Open Chat Floating Button */}
                    {!isChatOpen && (
                        <button 
                            onClick={() => setIsChatOpen(true)}
                            className="absolute right-0 top-1/2 -translate-y-1/2 bg-blue-600/90 text-white pl-1.5 pr-2.5 py-4 rounded-l-xl shadow-lg hover:bg-blue-700 hover:pr-3 transition-all flex items-center gap-0.5 z-40 backdrop-blur-sm group"
                            title="展开 AI 数据洞察"
                        >
                            <ChevronLeftIcon />
                            <span style={{ writingMode: 'vertical-rl' }} className="tracking-[0.2em] font-medium text-sm">AI洞察</span>
                        </button>
                    )}

                    {/* JSON Modal */}
                    {jsonModalData && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden animate-[fadeIn_0.2s_ease-out]">
                                {/* Modal Header */}
                                <div className="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50">
                                    <h3 className="text-base font-bold text-slate-800 flex items-center gap-2">
                                        <span className="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs font-mono">{jsonModalData.deviceName}</span>
                                        <span className="text-slate-500 text-sm">的</span>
                                        <span className="font-mono text-blue-600">{jsonModalData.colName}</span>
                                        <span className="text-slate-500 text-sm">{jsonModalData.colName === 'Target JSON' ? '输出' : '属性'}</span>
                                    </h3>
                                    <div className="flex items-center gap-3">
                                        <button 
                                            onClick={() => copyToClipboard(jsonModalData.data)}
                                            className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium border border-slate-300 rounded-lg hover:bg-white bg-slate-50 transition text-slate-700 shadow-sm"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                            复制
                                        </button>
                                        <button 
                                            onClick={() => setJsonModalData(null)} 
                                            className="p-1.5 hover:bg-slate-200 rounded-full text-slate-500 hover:text-slate-800 transition"
                                        >
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                        </button>
                                    </div>
                                </div>
                                {/* Modal Body - JSON Viewer */}
                                <div className="p-4 overflow-auto flex-1 bg-slate-900 relative">
                                    <pre className="font-mono text-sm text-green-400 whitespace-pre-wrap break-all">
                                        <code>{jsonModalData.data}</code>
                                    </pre>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
